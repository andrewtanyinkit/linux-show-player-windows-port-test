name: Build Windows Portable EXE

on:
  push:
    branches: [ master, main, develop ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Job 1: Lightweight build — no audio (no GStreamer dependency) ──────────
  build-windows:
    name: Windows EXE (no audio)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Windows-compatible dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-windows.txt

      - name: Install gi stub (for PyInstaller analysis on Windows)
        shell: pwsh
        run: |
          # Copy gi_stub/ into site-packages as 'gi' so PyInstaller can trace
          # gst_backend source files without crashing on 'import gi'.
          # The real gi is NOT needed for the no-audio build; the runtime hook
          # stubs it out at runtime.
          $sitePackages = python -c "import site; print(site.getsitepackages()[0])"
          $dest = Join-Path $sitePackages "gi"
          Write-Host "Installing gi stub to: $dest"
          Copy-Item -Recurse -Force "gi_stub" $dest
          python -c "import gi; gi.require_version('Gst','1.0'); print('gi stub OK')"

      - name: Verify key imports
        run: |
          python -c "import PyQt5; print('PyQt5:', PyQt5.__file__)"
          python -c "import appdirs; print('appdirs OK')"
          python -c "import mido; print('mido OK')"

      - name: Build portable single-file EXE
        run: |
          pyinstaller build_windows.spec --noconfirm --clean --log-level WARN

      - name: Verify EXE
        run: |
          if (Test-Path "dist/LinuxShowPlayer.exe") {
            $mb = [math]::Round((Get-Item "dist/LinuxShowPlayer.exe").length / 1MB, 1)
            Write-Host "SUCCESS: LinuxShowPlayer.exe ($mb MB)"
          } else {
            Write-Error "FAILED: LinuxShowPlayer.exe not found"
            exit 1
          }

      - name: Upload no-audio EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinuxShowPlayer-Windows-portable
          path: dist/LinuxShowPlayer.exe
          retention-days: 30

  # ── Job 2: Full build — includes GStreamer audio support ───────────────────
  build-windows-audio:
    name: Windows EXE (with GStreamer audio)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GStreamer MSVC runtime via Chocolatey
        run: |
          choco install gstreamer gstreamer-devel --yes --no-progress
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "GStreamer installed"

      - name: Detect GStreamer root and export to env
        shell: pwsh
        run: |
          # Reload env vars set by choco (PATH, GSTREAMER_* etc.)
          $machinePath = [System.Environment]::GetEnvironmentVariable("Path","Machine")
          $userPath    = [System.Environment]::GetEnvironmentVariable("Path","User")
          $env:Path    = "$machinePath;$userPath"

          # Print all env vars that mention gstreamer for diagnostics
          Write-Host "=== GStreamer-related env vars ==="
          Get-ChildItem Env: | Where-Object { $_.Name -match -join('gst','ream') -or $_.Value -match -join('gst','ream') } | ForEach-Object { Write-Host "$($_.Name) = $($_.Value)" }

          # Try known env vars first, then do a filesystem search
          $gstRoot = $null
          $candidates = @(
            [System.Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_MSVC_X86_64","Machine"),
            [System.Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_X86_64","Machine"),
            [System.Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_MSVC_X86_64","User"),
            $env:GSTREAMER_1_0_ROOT_MSVC_X86_64,
            $env:GSTREAMER_1_0_ROOT_X86_64,
            "C:\gstreamer\1.0\msvc_x86_64",
            "C:\gstreamer\1.0\x86_64",
            "C:\Program Files\gstreamer\1.0\msvc_x86_64",
            "C:\Program Files (x86)\gstreamer\1.0\msvc_x86_64"
          )
          foreach ($c in $candidates) {
            if ($c -and (Test-Path "$c\bin")) { $gstRoot = $c; break }
          }

          # Fallback: search C:\ for gstreamer
          if (-not $gstRoot) {
            Write-Host "Searching C:\ for gstreamer..."
            $found = Get-ChildItem "C:\" -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $gstRoot = $found.DirectoryName | Split-Path -Parent
              Write-Host "Found via search: $gstRoot"
            }
          }

          if (-not $gstRoot) {
            Write-Host "=== C:\ top-level dirs ==="
            Get-ChildItem "C:\" | Select-Object Name | ForEach-Object { Write-Host $_.Name }
            Write-Error "GStreamer root not found after install"
            exit 1
          }

          Write-Host "GStreamer root: $gstRoot"
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" >> $env:GITHUB_ENV
          echo "$gstRoot\bin" >> $env:GITHUB_PATH

      - name: Install Python dependencies + PyGObject
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-windows.txt
          pip install PyGObject

      - name: Verify GStreamer Python bindings
        run: |
          python -c "
          import os, sys
          gst_root = os.environ.get('GSTREAMER_1_0_ROOT_MSVC_X86_64', r'C:\gstreamer\1.0\msvc_x86_64')
          os.environ['GI_TYPELIB_PATH'] = os.path.join(gst_root, 'lib', 'girepository-1.0')
          os.environ['GST_PLUGIN_PATH'] = os.path.join(gst_root, 'lib', 'gstreamer-1.0')
          import gi
          gi.require_version('Gst', '1.0')
          from gi.repository import Gst
          Gst.init(None)
          print('GStreamer version:', Gst.version_string())
          "

      - name: Build EXE directory with GStreamer bundled
        run: |
          pyinstaller build_windows_gst.spec --noconfirm --clean --log-level WARN

      - name: Verify build output
        run: |
          $exePath = "dist/LinuxShowPlayer-audio/LinuxShowPlayer.exe"
          if (Test-Path $exePath) {
            $mb = [math]::Round((Get-Item $exePath).length / 1MB, 1)
            Write-Host "SUCCESS: LinuxShowPlayer.exe ($mb MB)"
            $dirMb = [math]::Round((Get-ChildItem "dist/LinuxShowPlayer-audio" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 0)
            Write-Host "Total bundle size: $dirMb MB"
          } else {
            Write-Error "FAILED: $exePath not found"
            Get-ChildItem dist/ -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }

      - name: Zip the audio bundle for distribution
        run: |
          Compress-Archive `
            -Path "dist/LinuxShowPlayer-audio/*" `
            -DestinationPath "dist/LinuxShowPlayer-Windows-with-audio.zip"
          $mb = [math]::Round((Get-Item "dist/LinuxShowPlayer-Windows-with-audio.zip").length / 1MB, 1)
          Write-Host "Zipped bundle: $mb MB"

      - name: Upload audio bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinuxShowPlayer-Windows-with-audio
          path: dist/LinuxShowPlayer-Windows-with-audio.zip
          retention-days: 30

  # ── Job 3: Attach both builds to GitHub Releases on version tags ───────────
  release:
    name: Publish GitHub Release
    needs: [ build-windows, build-windows-audio ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download no-audio EXE
        uses: actions/download-artifact@v4
        with:
          name: LinuxShowPlayer-Windows-portable
          path: release/

      - name: Download audio bundle
        uses: actions/download-artifact@v4
        with:
          name: LinuxShowPlayer-Windows-with-audio
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/LinuxShowPlayer.exe
            release/LinuxShowPlayer-Windows-with-audio.zip
          name: Linux Show Player ${{ github.ref_name }} — Windows
          body: |
            ## Windows Portable Builds — ${{ github.ref_name }}

            Two variants are provided:

            | File | Size | Audio | Notes |
            |------|------|-------|-------|
            | `LinuxShowPlayer.exe` | ~50 MB | No audio | Portable single file — all features except sound playback |
            | `LinuxShowPlayer-Windows-with-audio.zip` | ~300 MB | Full | Extract, run `LinuxShowPlayer.exe` inside — GStreamer bundled |

            ### `LinuxShowPlayer.exe` (no-audio build)
            Single portable file, no installation needed.
            Works for cue management, MIDI, OSC, network, timecode and all non-audio features.

            ### `LinuxShowPlayer-Windows-with-audio.zip` (full-audio build)
            Extract the zip and run `LinuxShowPlayer.exe` from the extracted folder.
            Full audio playback via GStreamer (WASAPI / DirectSound), ReplayGain normalisation, waveform display.

            **Plugins not available on Windows:** ALSA, PulseAudio, JACK, ArtNet/OLA.
          draft: false
          prerelease: false
