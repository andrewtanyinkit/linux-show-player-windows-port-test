name: Build Windows Portable EXE

on:
  push:
    branches: [ master, main, develop ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Windows-compatible dependencies
        run: pip install -r requirements-windows.txt

      - name: Verify key imports
        run: |
          python -c "import PyQt5; print('PyQt5 OK:', PyQt5.__file__)"
          python -c "import mido; print('mido OK:', mido.__version__)"
          python -c "import appdirs; print('appdirs OK')"
          python -c "import lisp; print('lisp package OK:', lisp.__version__)" || echo "lisp not on path yet (ok, handled by pathex)"

      - name: Build portable EXE with PyInstaller
        run: |
          pyinstaller build_windows.spec --noconfirm --clean --log-level WARN

      - name: Verify EXE was created
        run: |
          if (Test-Path "dist/LinuxShowPlayer.exe") {
            $size = (Get-Item "dist/LinuxShowPlayer.exe").length / 1MB
            Write-Host "SUCCESS: LinuxShowPlayer.exe built ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "FAILED: LinuxShowPlayer.exe not found in dist/"
            Get-ChildItem dist/ -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinuxShowPlayer-Windows-portable
          path: dist/LinuxShowPlayer.exe
          retention-days: 30

      - name: Create release and upload EXE (on tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LinuxShowPlayer.exe
          name: Linux Show Player ${{ github.ref_name }} (Windows)
          body: |
            ## Windows Portable Executable

            Single-file portable build of Linux Show Player for Windows.

            **Usage:** Download `LinuxShowPlayer.exe` and run directly — no installation required.

            **Plugins available on Windows:**
            - List Layout, Cart Layout
            - MIDI (uses Windows MIDI)
            - Network, OSC, Controller, Presets, Triggers, Synchronizer, Timecode, Action Cues

            **Plugins not available on Windows** (require Linux/GStreamer):
            - GStreamer audio backend (`gst_backend`) — for audio playback, install [GStreamer for Windows](https://gstreamer.freedesktop.org/download/) separately
            - Replay Gain, ArtNet
          draft: false
          prerelease: false
